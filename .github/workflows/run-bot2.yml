name: Run Music Bot 2

on:
  workflow_dispatch:
  schedule:
    - cron: "55 */5 * * *"

concurrency:
  group: music-bot-2
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN_2 }}
      BOT_NODE_INDEX: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start Bot 2
        run: node bot.js

name: Run Music Bot 3

on:
  workflow_dispatch:
  schedule:
    # Mỗi 6 giờ tại phút 50 → restart trước khi chạm giới hạn 6h
    - cron: "0 */6 * * *"

concurrency:
  group: music-bot-3
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN_3 }}
      BOT_NODE_INDEX: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run node bot.js
        run: node --max-old-space-size=1024 bot.js

name: Run Music Bot

on:
  workflow_dispatch:
  schedule:
    # Mỗi 6 giờ tại phút 50 → restart trước khi chạm giới hạn 6h
    - cron: "50 */5 * * *"

concurrency:
  group: music-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start Bot
        run: node bot.js